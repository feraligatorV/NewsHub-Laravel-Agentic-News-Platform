services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: newshub-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_code:/var/www/html
    networks:
      - newshub

  nginx:
    image: nginx:1.27-alpine
    container_name: newshub-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_code:/var/www/html:ro
    depends_on:
      - app
    networks:
      - newshub

  mysql:
    image: mysql:8.4
    container_name: newshub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: newshub
      MYSQL_USER: newshub
      MYSQL_PASSWORD: newshub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33066:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - newshub

  legal-ai-agent:
    build:
      context: ./legal-ai-agent
    container_name: newshub-legal-ai-agent
    restart: unless-stopped
    env_file:
      - path: ./legal-ai-agent/.env
        required: false
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newshub

volumes:
  app_code:
  mysql_data:

networks:
  newshub:
    driver: bridge
